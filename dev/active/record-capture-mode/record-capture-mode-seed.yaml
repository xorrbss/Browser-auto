# ⚠️ SUPERSEDE NOTICE (2026-06-02, post WF-1): three assumptions below were empirically
# WRONG on agent-browser 0.27.0 and are corrected in record-capture-mode-design.md (the
# implementation single-source-of-truth): (B1) uniqueness via `get count` is CSS-only ->
# count IN-PAGE; (B2) `addinitscript` is absent -> use `--init-script <abs-path>` on first
# open; (B3) headless is the default -> force AGENT_BROWSER_HEADED=1 + --headed. Value
# handling = parameterize ({{input_N}} + gitignored flows/<name>.values.json sidecar).
goal: Add a general-purpose `capture` mode to agent-qa's bin/probe-record.sh that, starting
  from a cached login state, injects a persistent in-page JS listener (via addinitscript)
  to record the user's click/input/select/Enter/navigation actions, hardens each into a
  stable semantic locator (testid>role+name>label>text>placeholder, marking NEEDS_REVIEW
  with candidates when none is unique), auto-inserts wait gates and a final assert_url,
  and emits the existing flows/<name>.flow.json — verified done when record->compile->replay
  is green for a clean recording.
task_type: code
brownfield_context:
  project_type: brownfield
  context_references:
  - path: bin/probe-record.sh
    role: primary
    summary: Standalone authoring leaf with scaffold + compile modes; add a third `capture` mode here.
  - path: flows/SCHEMA.md
    role: schema
    summary: flow.json schema (find/wait steps + asserts, NO @eN field). Capture must emit this; needs a NEEDS_REVIEW extension.
  - path: lib/env.sh
    role: support
    summary: AB() and AB_AUTH() — capture reuses AB_AUTH for cached-state start (dep direction bin->lib is allowed).
  - path: setup/auth.sh
    role: support
    summary: One-time headed wait-for-human login -> fixtures/auth/<app>.state.json. Reused unchanged for T5.
  existing_patterns:
  - scaffold -> (author flow.json) -> compile -> .test.sh authoring pipeline
  - semantic locators only; @eN refs forbidden (stale by construction)
  - verification via --json .success, never exit code
  - AB_AUTH <app> injects cached --state
  - one wait-gate per page transition
  existing_dependencies:
  - agent-browser 0.27.0 (eval, addinitscript, --state/AB_AUTH, --auto-connect)
  - jq, bash (Git Bash), node
constraints:
- Pure bash (Git Bash); extend bin/probe-record.sh in place; keep file under ~250 lines; no new abstraction layer
- Output MUST conform to flows/SCHEMA.md; NO @eN ref field ever emitted
- Recording starts from cached AB_AUTH state; login/OTP/credentials are never captured
- Capture mechanism is an addinitscript-injected DOM listener; events buffered in sessionStorage to survive the window reset on navigation
- type=password input values are masked/omitted even mid-journey (defense in depth)
- Stop is a CLI signal (Enter/Ctrl-C); the host does a final eval flush then closes the browser — never rely on browser-close (avoids the workflow-use self-destruct race)
- Action coverage is exactly click, text input (fill), select change, Enter key, navigation; scroll and hover are excluded (agent-browser auto-scrolls to elements on replay)
- New tabs / popups / cross-origin iframes are OUT OF SCOPE (single top-frame, single tab); a navigation that opens a new tab ends capture with a logged warning
- No unique stable locator => emit the step with needs_review:true and >=2 candidate locators; never silently emit a fragile selector
- A wait step (until:url) is auto-inserted at each detected navigation boundary
- Only a final assert (url) is auto-appended; richer asserts are added post-hoc by the agent/human
- No new external dependency
acceptance_criteria:
- '`probe-record.sh capture <name> <startUrl> [--app <app>]` opens startUrl (from cached state when --app set) and injects the capture listener via addinitscript before first paint'
- User clicks, text inputs, select changes, Enter presses, and navigations are recorded in execution order
- Each recorded action resolves to a locator by priority testid>role+name>label>text>placeholder, verified unique via `get count --json`==1
- An action with no unique stable locator yields a flow step with needs_review:true carrying >=2 candidate locators, and recording continues uninterrupted
- Captured events survive at least one cross-page navigation with zero loss (sessionStorage buffer proven)
- A wait step until:url is present at every detected navigation boundary in the output
- Recording stops on the CLI signal; the host flushes remaining buffered events and writes flows/<name>.flow.json before the browser is closed
- The produced flow.json validates against flows/SCHEMA.md and contains no @eN field
- type=password values never appear in the produced flow.json
- A trailing asserts entry of kind url for the ending URL is present
- For a recording with zero needs_review steps, `compile` then `run.sh <name>` replays green on the first deterministic run (round-trip)
ontology_schema:
  name: RecordedAction
  description: One captured user interaction hardened for deterministic replay; the flow.json is the ordered list of these plus auto-inserted waits and a trailing url assert.
  fields:
  - name: sequence_index
    type: number
    description: Zero-based order of the action within the recording
    required: true
  - name: action_type
    type: string
    description: One of click | input | select | key | navigate
    required: true
  - name: locator_strategy
    type: string
    description: testid | role | label | text | placeholder | none (none => needs_review)
    required: true
  - name: locator_value
    type: string
    description: The resolved semantic locator value (e.g. the visible text or label)
    required: true
  - name: locator_name
    type: string
    description: Accessible name, present only when locator_strategy is role
    required: false
  - name: input_value
    type: string
    description: Text typed / option selected / key name; null for click and navigate; masked for type=password
    required: false
  - name: needs_review
    type: boolean
    description: True when no unique stable locator was found; step is non-compilable until resolved
    required: true
  - name: candidates
    type: array
    description: Two or more alternative locator descriptors, populated only when needs_review is true
    required: false
  - name: url_at_capture
    type: string
    description: The page URL when the action was captured (drives navigation-boundary wait gates)
    required: true
  - name: is_navigation_boundary
    type: boolean
    description: True when this action caused a URL change, triggering an auto-inserted wait until:url
    required: true
evaluation_principles:
- name: locator_stability
  description: Every emitted locator is semantic and unique, or the step is explicitly needs_review with candidates; no silent fragile selector is ever written
  weight: 0.25
- name: schema_conformance
  description: Output validates against flows/SCHEMA.md with no @eN field and compiles through the existing pipeline unchanged
  weight: 0.2
- name: navigation_persistence
  description: Events survive the window reset on navigation via sessionStorage, and a wait until:url gate is inserted at every boundary
  weight: 0.2
- name: structure_reuse
  description: Implemented as a third mode in bin/probe-record.sh reusing AB_AUTH and the compile pipeline; no new layer, bash only, within size limit
  weight: 0.15
- name: security_boundary
  description: Capture starts from cached state and never records credentials, OTP, or type=password values
  weight: 0.1
- name: roundtrip_replay
  description: A clean (no needs_review) recording replays green via compile then run.sh on the first deterministic run
  weight: 0.1
exit_conditions:
- name: poc_validated
  description: The gating technical risk is retired first
  criteria: An addinitscript-injected listener is proven to capture an action and persist it across one navigation (read back via eval --json)
- name: all_criteria_met
  description: All acceptance criteria evaluate as satisfied
  criteria: Every acceptance_criteria item is demonstrably true
- name: roundtrip_green
  description: End-to-end authoring works without AI
  criteria: A clean recording compiles and replays green through run.sh
